<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>¿Quieres Renunciar?</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e8, #d8b4ff);
      overflow: hidden;
    }

    .card {
      background: linear-gradient(135deg, #000000, #3b0764);
      <img src="https://wallpaperaccess.com/full/2641047.gif">
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    img {
      width: 130px;
      border-radius: 20px;
    }

    h1 {
      color: #b83280;
    }

    button {
      padding: 12px 25px;
      margin: 15px;
      border: none;
      border-radius: 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #si {
      background: #ff69b4;
      color: white;
    }

    #no {
      background: #ddd6fe;
      color: #5b21b6;
      position: relative;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="https://media.tenor.com/JQq16u9aZnIAAAAi/cat-kitten.gif">

    <h1>🌸 ¿Quieres Renunciar? 🌸</h1>

    <button id="si" onclick="aceptar()">No 💖 </button>
    <button id="no">Sí 😭</button>
  </div>

  <script>
    const botonNo = document.getElementById("no");

    botonSi.addEventListener("mouseover", function() {
      const anchoPantalla = window.innerWidth;
      const altoPantalla = window.innerHeight;

      const nuevaX = Math.random() * (anchoPantalla - 100);
      const nuevaY = Math.random() * (altoPantalla - 100);

      botonSi.style.position = "fixed";
      botonSi.style.left = nuevaX + "px";
      botonSi.style.top = nuevaY + "px";
    });

    function aceptar() {
      document.body.innerHTML = `
        <div style="text-align:center; font-family:Arial;">
          <h1>¡Yujuuuu! 💖</h1>
          <h2>Sabía que dirías que no 😌✨</h2>
        </div>
      `;
    }
  </script>

</body>
</html>
